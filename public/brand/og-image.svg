  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="630" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="900" y1="0" x2="900" y2="630" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>

