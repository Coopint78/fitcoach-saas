name: Deploy to VPS

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 2.25.84.53
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /var/www/fitcoach
            git pull
            npm install --production=false
            npm run build
            pm2 restart fitcoach
            echo "Deploy completado OK: $(date)"
