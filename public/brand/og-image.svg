  <rect x="278" y="360" width="168" height="40" rx="20" fill="#1A2035" stroke="#ffffff" stroke-width="1" stroke-opacity="0.12"/>
  <text x="362" y="385" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#9CA3AF" text-anchor="middle">Creador de rutinas</text>

  <rect x="462" y="360" width="172" height="40" rx="20" fill="#1A2035" stroke="#ffffff" stroke-width="1" stroke-opacity="0.12"/>
