  <text x="224" y="245" font-family="Inter, -apple-system, sans-serif" font-size="58" font-weight="800" fill="#FFFFFF" letter-spacing="-1.5">FitCoach</text>
  <text x="224" y="310" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#9CA3AF" letter-spacing="-0.3">Plataforma para entrenadores personales</text>

