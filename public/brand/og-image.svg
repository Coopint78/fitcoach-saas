  <rect x="776" y="386" width="210" height="8" rx="4" fill="#A3E635" opacity="0.6"/>
  <rect x="776" y="406" width="328" height="8" rx="4" fill="#0F1117"/>
  <rect x="776" y="406" width="140" height="8" rx="4" fill="#A3E635" opacity="0.4"/>
  <rect x="776" y="426" width="328" height="8" rx="4" fill="#0F1117"/>
  <rect x="776" y="426" width="280" height="8" rx="4" fill="#A3E635" opacity="0.5"/>
