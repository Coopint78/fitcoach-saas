  <circle cx="800" cy="282" r="14" fill="#A3E635" opacity="0.2"/>
  <rect x="824" y="272" width="100" height="7" rx="3.5" fill="#ffffff" opacity="0.3"/>
  <rect x="824" y="286" width="70" height="5" rx="2.5" fill="#ffffff" opacity="0.1"/>
  <rect x="1060" y="275" width="38" height="16" rx="8" fill="#A3E635" opacity="0.2"/>
  <rect x="776" y="318" width="328" height="52" rx="10" fill="#0F1117"/>
  <circle cx="800" cy="344" r="14" fill="#A3E635" opacity="0.15"/>
  <rect x="824" y="334" width="120" height="7" rx="3.5" fill="#ffffff" opacity="0.25"/>
  <rect x="824" y="348" width="80" height="5" rx="2.5" fill="#ffffff" opacity="0.1"/>
  <rect x="1060" y="337" width="38" height="16" rx="8" fill="#ffffff" opacity="0.08"/>
