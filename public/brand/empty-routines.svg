  <!-- Clipboard icon -->
  <rect x="110" y="58" width="60" height="74" rx="8" fill="#1A2035" stroke="#A3E635" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="126" y="52" width="28" height="12" rx="6" fill="#1A2035" stroke="#A3E635" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Lines on clipboard -->
